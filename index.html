    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .page { font-family: 'Barlow', sans-serif; background: #f0f0f0; color: #111; overflow-x: hidden; }
        
        .top-bar { position: relative; z-index: 10; background: #111; padding: 10px 24px; display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 80px; width: auto; }
        .logo-text-group { display: flex; flex-direction: column; }

        .hero { position: relative; min-height: 500px; background: #e8e8e8; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 0 40px 0; }

        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(235,235,235,0.97) 42%, rgba(235,235,235,0.1) 100%); }
        .stripe { position: absolute; right: 60px; top: 0; bottom: 0; width: 6px; background: #cc0000; transform: skewX(-8deg); }
        .stripe2 { position: absolute; right: 48px; top: 0; bottom: 0; width: 3px; background: #e63030; transform: skewX(-8deg); }
        .hero-content { position: relative; z-index: 2; padding: 0 24px; }
        .hero-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 58px; line-height: 0.92; text-transform: uppercase; color: #111; }
        .hero-title span { color: #cc0000; }
        .hero-divider { width: 48px; height: 4px; background: #cc0000; margin: 16px 0; }
        .hero-sub { font-size: 14px; color: #555; margin-bottom: 24px; max-width: 280px; }
        .btn-cta { display: inline-block; background: #cc0000; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 30px; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%, 8px 50%); border: none; cursor: pointer; transition: 0.3s; }
        .btn-cta:hover { background: #a80000; transform: scale(1.05); }
        .tags { display: flex; gap: 8px; margin-top: 20px; }
        .tags span { font-size: 10px; letter-spacing: 1px; color: #777; text-transform: uppercase; border: 1px solid #ddd; padding: 4px 10px; background: #fff; }
        .section-sponsors { background: #fff; padding: 40px 24px; border-top: 4px solid #cc0000; }
        .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #bbb; text-align: center; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .section-title::before, .section-title::after { content: ''; flex: 1; height: 1px; background: #eee; }
        .sponsor-container { display: flex; justify-content: center; align-items: center; }
        .sponsor-card { background: #fcfcfc; border: 10px solid #efefef; border-top: 10px solid #ddd; border-radius: 10px; padding: 25px; display: flex; align-items: center; justify-content: center; min-height: 120px; max-width: 300px; width: 100%; }
        .sponsor-logo { max-width: 180%; max-height: 180px; object-fit: contain; }
        .footer { background: #111; padding: 25px; text-align: center; cursor: pointer; border-top: 1px solid #222; }
        .ig-badge { display: inline-flex; align-items: center; background: #cc0000; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; padding: 6px 15px; border-radius: 2px; margin-bottom: 10px; text-transform: uppercase; }
